<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinella</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    background: #0d1019;
    color: #e6e9f2;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }
  .splash {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.5;
    filter: brightness(0.45) saturate(0.7);
    border-radius: 12px;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .status {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.02em;
    min-height: 18px;
  }
  .steps {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 20px;
    min-width: 260px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    transition: color 0.3s;
  }
  .step.done { color: rgba(46,204,100,0.8); }
  .step.active { color: rgba(255,255,255,0.7); }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .step.done .dot { background: #2ecc64; }
  .step.active .dot {
    background: #3c82f5;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }
  .footer {
    position: absolute;
    bottom: 12px;
    font-size: 9px;
    color: rgba(255,255,255,0.15);
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="splash" data-tauri-drag-region>
    <img class="bg" src="assets/load_ui.png" alt="" onerror="this.style.display='none'">
    <div class="content">
      <div class="status" id="status">Initializing...</div>
      <div class="steps">
        <div class="step active" id="s-daemon"><div class="dot"></div>Connecting to daemon</div>
        <div class="step" id="s-engine"><div class="dot"></div>Loading ClamAV engine</div>
        <div class="step" id="s-sigs"><div class="dot"></div>Loading signatures</div>
        <div class="step" id="s-argus"><div class="dot"></div>Initializing ARGUS heuristics</div>
        <div class="step" id="s-watcher"><div class="dot"></div>Preparing real-time monitoring</div>
      </div>
    </div>
    <div class="footer">Lucent Open Software &middot; GPLv2 &middot; v0.1.0</div>
  </div>
  <script>
    // Polling — check daemon readiness from splash.
    // Uses Tauri invoke if available, otherwise polls via fetch.
    const steps = ['s-daemon','s-engine','s-sigs','s-argus','s-watcher'];
    let currentStep = 0;

    function markStep(idx, state) {
      const el = document.getElementById(steps[idx]);
      if (!el) return;
      el.className = 'step ' + state;
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    async function pollDaemon() {
      try {
        // Use Tauri IPC to check engine status.
        if (window.__TAURI__) {
          const { invoke } = window.__TAURI__.core;
          const engine = await invoke('get_engine_status');

          // Step 1: daemon connected.
          markStep(0, 'done');
          setStatus('Loading ClamAV engine...');
          markStep(1, 'active');

          if (engine.state === 'ready') {
            markStep(1, 'done');
            setStatus('Loading signatures...');
            markStep(2, 'active');

            if (engine.signature_count > 0) {
              markStep(2, 'done');
              setStatus('Initializing ARGUS heuristics...');
              markStep(3, 'active');

              // Check ARGUS via runtime stats.
              try {
                const stats = await invoke('get_runtime_stats');
                if (stats.argus_yara_rules > 0) {
                  markStep(3, 'done');
                  setStatus('Preparing real-time monitoring...');
                  markStep(4, 'active');

                  if (stats.watcher_active) {
                    markStep(4, 'done');
                  }

                  setStatus('Ready');
                  // Signal Rust to show main window.
                  setTimeout(() => {
                    invoke('splash_ready').catch(() => {});
                  }, 600);
                  return; // Stop polling.
                }
              } catch(e) { /* stats not ready yet */ }
            }
          }
        }
      } catch(e) {
        // Daemon not ready — keep polling.
        setStatus('Connecting to daemon...');
      }
      // Keep polling.
      setTimeout(pollDaemon, 1000);
    }

    // Start polling after brief delay (let window render).
    setTimeout(pollDaemon, 500);

    // Hard timeout — show main anyway after 45s.
    setTimeout(() => {
      if (window.__TAURI__) {
        setStatus('Starting in limited mode...');
        window.__TAURI__.core.invoke('splash_ready').catch(() => {});
      }
    }, 45000);
  </script>
</body>
</html>
