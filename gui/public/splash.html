<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinella</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    background: #0d1019;
    color: #e6e9f2;
    user-select: none;
  }
  .splash {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.5;
    filter: brightness(0.45) saturate(0.7);
  }
  .content {
    position: absolute;
    bottom: 36px;
    right: 36px;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }
  .status {
    min-height: 18px;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    padding-right: 4px;
  }
  .steps {
    min-width: 260px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.45);
  }
  .step {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }
  .step.done { color: rgba(46,204,100,0.8); }
  .step.active { color: rgba(255,255,255,0.7); }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .step.done .dot { background: #2ecc64; }
  .step.active .dot { background: #3c82f5; }
  .footer {
    position: absolute;
    bottom: 12px;
    z-index: 1;
    font-size: 9px;
    color: rgba(255,255,255,0.15);
  }
</style>
</head>
<body>
  <div class="splash" data-tauri-drag-region>
    <img class="bg" src="assets/load_ui.png" alt="">
    <div class="content">
      <div class="status" id="status">Initializing...</div>
      <div class="steps">
        <div class="step active" id="s0"><div class="dot"></div>Connecting to daemon</div>
        <div class="step" id="s1"><div class="dot"></div>Loading ClamAV engine</div>
        <div class="step" id="s2"><div class="dot"></div>Loading signatures</div>
        <div class="step" id="s3"><div class="dot"></div>Initializing ARGUS · ASTRA analysis</div>
        <div class="step" id="s4"><div class="dot"></div>Preparing real-time monitoring</div>
      </div>
    </div>
    <div class="footer">Lucent Open Software &middot; GPLv2 &middot; v0.1.0</div>
  </div>
  <script src="splash.js"></script>
</body>
</html>
