# Sentinella — freshclam configuration
# Downloads ClamAV signature databases into the runtime directory.

# Where to store .cvd/.cld signature files.
DatabaseDirectory C:\Users\Nicolas\Desktop\sentinella\runtime\signatures

# Log file for update operations.
UpdateLogFile C:\Users\Nicolas\Desktop\sentinella\runtime\logs\freshclam.log
LogTime yes
LogVerbose yes

# Official ClamAV signature mirror.
DatabaseMirror database.clamav.net

# Number of update attempts before giving up.
MaxAttempts 3

# Connect timeout in seconds.
ConnectTimeout 30
ReceiveTimeout 60
