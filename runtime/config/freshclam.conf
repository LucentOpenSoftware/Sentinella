# Sentinella - freshclam configuration (dev mode).
# Points to project-local runtime directories.
# Production installer replaces this with ProgramData paths.

DatabaseDirectory runtime/signatures
UpdateLogFile runtime/logs/freshclam.log
LogTime yes
LogVerbose yes

DatabaseMirror database.clamav.net
MaxAttempts 3
ConnectTimeout 30
ReceiveTimeout 60
